# 1 日 2 回（JST 9:00 / 21:00）RSS を取り込み、news-feed.json をコミットして push → Render が自動ビルド
# 手動: Actions → 「Refresh news feed」→ Run workflow

name: Refresh news feed

concurrency:
  group: refresh-news-feed
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Fetch RSS and write public/news-feed.json
        run: node scripts/fetch-external-news.mjs

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news-feed.json
          if git diff --cached --quiet; then
            echo "No changes to news-feed.json"
            exit 0
          fi

          # リモートが先に進んでいるケースがあるため、最新にリベースしてから push
          # （競合した場合は public/news-feed.json は今回生成した内容を採用）
          git pull --rebase --autostash origin "$BRANCH" || {
            if git diff --name-only --diff-filter=U | grep -q '^public/news-feed\.json$'; then
              git checkout --ours -- public/news-feed.json
              git add public/news-feed.json
              git rebase --continue
            else
              git rebase --abort || true
              echo "::error::Rebase failed with unexpected conflicts"
              exit 1
            fi
          }

          git add public/news-feed.json
          git commit -m "chore: refresh news-feed.json"
          git push origin "HEAD:$BRANCH"
